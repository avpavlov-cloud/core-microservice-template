# Количество запущенных копий приложения
replicaCount: 2

# Настройки контейнера
image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Если tag не указан, Helm возьмет appVersion из Chart.yaml
  tag: ""

# Настройки сети внутри кластера
service:
  type: ClusterIP
  port: 80

# Настройки ресурсов (чтобы приложение не "съело" весь сервер)
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Настройки внешнего доступа
ingress:
  enabled: true
  # Замените на ваш реальный домен или используйте локальный (например, my-app.local)
  host: "my-app.local"
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

# Настройки автоматического масштабирования
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

